version: '3.8'

services:
  # API 网关
  gateway:
    image: smart-parking/gateway:1.0.0
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # 用户服务
  user-service:
    image: smart-parking/user-service:1.0.0
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=postgres
      - DB_NAME=pg_user
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
    depends_on:
      - postgres
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # 车场服务
  parking-service:
    image: smart-parking/parking-service:1.0.0
    build:
      context: ./parking-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=postgres
      - DB_NAME=pg_parking
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
    depends_on:
      - postgres
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # 订单服务
  order-service:
    image: smart-parking/order-service:1.0.0
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=postgres
      - DB_NAME=pg_order
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
    depends_on:
      - postgres
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # 支付服务
  payment-service:
    image: smart-parking/payment-service:1.0.0
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=postgres
      - DB_NAME=pg_payment
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
    depends_on:
      - postgres
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # 设备服务
  device-service:
    image: smart-parking/device-service:1.0.0
    build:
      context: ./device-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=postgres
      - DB_NAME=pg_device
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
    depends_on:
      - postgres
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # 报表服务
  report-service:
    image: smart-parking/report-service:1.0.0
    build:
      context: ./report-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - NACOS_SERVER_ADDR=nacos:8848
      - DB_HOST=postgres
      - DB_NAME=pg_report
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
      - nacos
    networks:
      - smart-parking-net
    restart: always

  # Nacos 配置中心
  nacos:
    image: nacos/nacos-server:2.0.3
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=nacos_config
    volumes:
      - ./nacos/init.d:/home/nacos/init.d
    depends_on:
      - postgres
    networks:
      - smart-parking-net
    restart: always

  # PostgreSQL 数据库
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=master
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./database/init-db:/docker-entrypoint-initdb.d
    networks:
      - smart-parking-net
    restart: always

  # Redis 缓存
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - smart-parking-net
    restart: always

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - smart-parking-net
    restart: always

  # Nginx 反向代理 (生产环境使用)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - gateway
    networks:
      - smart-parking-net
    restart: always
    profiles:
      - production

networks:
  smart-parking-net:
    driver: bridge
