# =====================================================
# 智慧停车管理平台 - Nacos 公共配置
# Data ID: application-common.yaml
# Group: DEFAULT_GROUP
# =====================================================

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: public
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        file-extension: yaml
        namespace: public
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: application-common.yaml
            refresh: true

  # Jackson 配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: t_
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    root: INFO
    com.smartparking: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/smart-parking.log
    max-size: 10MB
    max-history: 30

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Swagger 配置
swagger:
  title: 智慧停车管理平台 API
  description: Smart Parking Management Platform RESTful API
  version: 1.0.0
  terms-of-service-url: http://www.smartparking.com
  contact:
    name: Smart Parking Team
    email: support@smartparking.com
  base-package: com.smartparking

# 通用配置
app:
  jwt:
    secret: smart-parking-jwt-secret-key-2026
    expiration: 7200000  # 2 小时 (毫秒)
    header: Authorization
    prefix: Bearer 
  free-duration-minutes: 30  # 免费停车时长 (分钟)
  max-daily-amount: 100.00   # 每日封顶价格 (元)
